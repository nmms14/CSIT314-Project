<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Avatar</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent-light: #e9c46a;
            --bg: #f0f2f5;
            --bg-white: #ffffff;
            --text: #2b2d42;
            --text-light: #555b6e;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
        }

        /* ── Top Navbar ── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(27, 67, 50, 0.04);
        }

        .brand-logo {
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--primary-dark);
        }

        .brand-logo span {
            color: var(--accent-light);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .role-badge {
            display: inline-block;
            padding: 0.45rem 1rem;
            border-radius: 50px;
            background: rgba(45, 106, 79, 0.1);
            color: var(--primary-dark);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        .logout-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45,106,79,0.3);
        }

        /* ── Layout (Sidebar + Main) ── */
        .layout {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--bg-white);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            padding: 2.5rem 2rem;
            max-width: 1200px;
        }

        .welcome {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        /* ── Logout Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .modal h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .modal p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .btn-modal {
            padding: 0.65rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .btn-yes {
            background: var(--primary);
            color: #fff;
        }

        .btn-yes:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45,106,79,0.3);
        }

        .btn-cancel {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-cancel:hover {
            background: #cbd5e0;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="brand-logo">Ava<span>tar</span></a>
        <div class="nav-right">
            <span class="role-badge">{{ role }}</span>
            <a href="#" class="logout-btn" onclick="showLogoutModal(event)">Sign Out</a>
        </div>
    </nav>

    <!-- Layout: Sidebar + Main -->
    <div class="layout">
        <aside class="sidebar"></aside>

        <main class="main">
            <h1 class="welcome">Welcome, {{ name }}</h1>
        </main>
    </div>

    <!-- Logout Confirmation Modal -->
    <div class="modal-overlay" id="logoutModal" onclick="hideLogoutModalOnOverlay(event)">
        <div class="modal">
            <h2>Sign Out</h2>
            <p>Are you sure you want to log out?</p>
            <div class="modal-buttons">
                <a href="{% url 'logout' %}" class="btn-modal btn-yes">Yes</a>
                <button type="button" class="btn-modal btn-cancel" onclick="hideLogoutModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function showLogoutModal(event) {
            event.preventDefault();
            document.getElementById('logoutModal').classList.add('active');
        }

        function hideLogoutModal() {
            document.getElementById('logoutModal').classList.remove('active');
        }

        function hideLogoutModalOnOverlay(event) {
            if (event.target === event.currentTarget) {
                hideLogoutModal();
            }
        }
    </script>

</body>
</html>
