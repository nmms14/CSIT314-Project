<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Avatar</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent: #d4a373;
            --accent-light: #e9c46a;
            --bg: #fefae0;
            --bg-white: #ffffff;
            --text: #2b2d42;
            --text-light: #555b6e;
            --radius: 12px;
            --error: #d62828;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
        }

        /* ── Form Panel ── */
        .form-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(27, 67, 50, 0.12);
            width: 100%;
            max-width: 480px;
            margin: 2rem 1rem;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        .form-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* ── Error Message ── */
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── Success Message ── */
        .success-msg {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: var(--primary-dark);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── Form Fields ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: var(--bg-white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45,106,79,0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── Footer Link ── */
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-light);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .form-panel {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Form Panel -->
    <div class="form-panel">
        <div class="form-container">
            <div class="form-header">
                <h1>Sign in</h1>
            </div>

            {% if logged_out %}
                <div class="success-msg">You have successfully logged out</div>
            {% endif %}

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="form-footer">
                <a href="{% url 'landing' %}" class="back-link">&larr; Back to home</a>
            </div>
        </div>
    </div>

</body>
</html>
